<div class="mermaid-dialog dialog" data-title="Generate Diagram by Mermaid">
  <div class="dialog-body">
    <div style="display: flex; justify-content: space-between; align-items: center; gap: 0.5rem;">
      <div style="height: 1.5rem">
        Enter your mermaid code in the text area below.
      </div>
      <div>
        <button class="k-button quiet example-dropdown">
          Examples
          <span class="k-icon k-i-arrow-s"></span>
        </button>
      </div>
    </div>
    <textarea id="mermaid-code-editor" class='k-textbox small' rows="10" placeholder="Enter your diagram code here..."></textarea>
    <div class="options">
      
    </div>
  </div>
  <div class="dialog-footer">
    <div class="left" style="text-align: left;">
      <button class="k-button outline clear-button">Clear</button>  
    </div>
    <button class="k-button dialog-button primary" data-button-id="ok">Generate</button>
    <button class="k-button dialog-button outline" data-button-id="cancel">Close</button>
  </div>
</div>
